name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # Never cancel main: its e2e job uploads the auto-approved Argos baseline
  # that every PR build diffs against — cancelling it leaves PRs diffing
  # against a stale baseline.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    name: Safeguards, lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The full pre-commit gate: repo safeguards (architecture, clock, ADR,
      # doc links) + lint + typecheck + unit tests — the same bar agents run
      # locally. Running the pieces individually here silently skipped the
      # safeguards for every PR.
      - run: pnpm check
      - run: pnpm build
      # Guards the shared first-load JS every staff page pays, so a phone at the
      # dock on weak Wi-Fi never silently gets slower (docs/architecture/performance-budgets.md).
      - run: pnpm perf:budget

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: npx playwright install --with-deps chromium
      - run: pnpm e2e
        env:
          # Uploads visual snapshots to Argos when configured; absent (forks,
          # pre-signup) the Argos reporter is a no-op and the suite still runs.
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
